<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Admin Dashboard</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-graduation-cap"></i>
                    <span>CampusEvents</span>
                </div>
                <button id="close-sidebar" class="sidebar-toggle-btn mobile-only">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="active">
                        <a href="#" data-page="dashboard">
                            <i class="fa-solid fa-grid-2"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="events">
                            <i class="fa-solid fa-calendar-day"></i>
                            <span>Events</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="students">
                            <i class="fa-solid fa-users"></i>
                            <span>Students</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="reports">
                            <i class="fa-solid fa-chart-pie"></i>
                            <span>Reports</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-page="settings">
                            <i class="fa-solid fa-gear"></i>
                            <span>Settings</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="admin_login.html" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="toggle-menu-btn" id="open-sidebar">
                    <i class="fa-solid fa-bars"></i>
                </div>

                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-input" placeholder="Search events...">
                </div>

                <div class="top-bar-actions">
                    <div class="action-item notification">
                        <i class="fa-solid fa-bell"></i>
                        <span class="badge">3</span>
                    </div>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff"
                            alt="Admin Profile">
                        <div class="user-info">
                            <span class="name">Admin User</span>
                            <span class="role">Administrator</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="content-wrapper" id="main-view">
                <div class="page-header">
                    <h1>Dashboard Overview</h1>
                    <button class="btn-primary" id="create-event-btn">
                        <i class="fa-solid fa-plus"></i> Create New Event
                    </button>
                </div>

                <!-- Metrics Cards -->
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="card-icon blue">
                            <i class="fa-solid fa-calendar-check"></i>
                        </div>
                        <div class="card-info">
                            <h3>Total Events</h3>
                            <p class="number" id="total-events-count">0</p>
                            <span class="trend up"><i class="fa-solid fa-arrow-up"></i> 12% this month</span>
                        </div>
                    </div>
                    <div class="metric-card">
                        <div class="card-icon green">
                            <i class="fa-solid fa-calendar-days"></i>
                        </div>
                        <div class="card-info">
                            <h3>Upcoming Events</h3>
                            <p class="number" id="upcoming-events-count">0</p>
                            <span class="trend up"><i class="fa-solid fa-arrow-up"></i> 5% this week</span>
                        </div>
                    </div>
                </div>

                <!-- Recent Events Table -->
                <div class="recent-events-section">
                    <div class="section-header">
                        <h2>Recent Events</h2>
                        <a href="#" class="view-all">View All</a>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Event Name</th>
                                    <th>Organizer</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="events-table-body">
                                <!-- Populated by JS -->
                                <!-- Populated by JS -->

                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Event Modal -->
    <div id="add-event-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Event</h2>
                <button class="close-modal" id="close-modal-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="add-event-form">
                    <div class="form-group">
                        <label for="event-name">Event Name</label>
                        <input type="text" id="event-name" required placeholder="Ex: Tech Hackathon 2024">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="event-date">Date</label>
                            <input type="date" id="event-date" required>
                        </div>
                        <div class="form-group">
                            <label for="event-category">Category</label>
                            <select id="event-category" required>
                                <option value="Technology">Technology</option>
                                <option value="Cultural">Cultural</option>
                                <option value="Social">Social</option>
                                <option value="Sports">Sports</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="event-organizer">Organizer</label>
                        <input type="text" id="event-organizer" required placeholder="Ex: Computer Science Dept">
                    </div>
                    <div class="form-group">
                        <label for="event-status">Status</label>
                        <select id="event-status">
                            <option value="Upcoming">Upcoming</option>
                            <option value="Ongoing">Ongoing</option>
                            <option value="Finished">Finished</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancel-btn">Cancel</button>
                        <button type="submit" class="btn-primary">Add Event</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
